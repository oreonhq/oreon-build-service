<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build - Oreon Build Service</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <style>
    .build-meta { margin-bottom: 1rem; }
    .build-meta dl { display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1rem; }
    .build-meta dt { color: var(--text-muted); }
    .attempt-card { margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; }
    .attempt-card h4 { margin: 0 0 0.5rem 0; }
    .attempt-error { color: var(--danger, #c00); margin: 0.5rem 0; font-size: 0.9rem; }
    .log-viewer { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 4px; overflow: auto; max-height: 70vh; font-family: ui-monospace, monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
    .log-placeholder { color: var(--text-muted); font-style: italic; }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="header-logo-link"><img src="/static/obslogo.png" alt="Oreon Build Service" class="header-logo" /></a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/builds.html">Builds</a>
      <a href="/packages.html">Packages</a>
      <a href="/releases.html">Releases</a>
      <a href="/workers.html">Workers</a>
      <a href="/mock-environments.html">Mock Environments</a>
      <a href="/repos.html">Repositories</a>
      <a href="/promotions.html">Promotions</a>
      <form class="navbar-search" action="/search.html" method="get" style="display:inline-flex; margin-left:0.5rem;">
        <input type="search" name="q" placeholder="Search…" style="padding:0.25rem 0.5rem; width:10rem;">
        <button type="submit" class="btn" style="margin-left:0.25rem;">Go</button>
      </form>
      <span id="auth-section"><span id="user-info"></span><button id="btn-login" type="button">Login</button><button id="btn-logout" type="button" style="display:none">Logout</button></span>
    </nav>
  </header>
  <main class="main">
    <section class="card">
      <h2>Build <span id="job-id">—</span></h2>
      <div id="build-loading" class="build-meta">Loading…</div>
      <div id="build-meta" class="build-meta" style="display:none;"></div>
      <div id="build-error" style="display:none; color: var(--danger, #c00);"></div>
      <h3 style="margin-top:1.5rem;">Attempts</h3>
      <div id="attempts-list"></div>
    </section>
  </main>
  <script src="/static/app.js?v=2"></script>
  <script>
    (function() {
      const api = window.oreonApi;
      function getJobId() {
        var params = new URLSearchParams(window.location.search);
        return params.get('job_id') || '';
      }
      function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
      function statusClass(s) {
        if (s === 'success') return 'badge success';
        if (s === 'failed' || s === 'cancelled') return 'badge failed';
        if (s === 'running' || s === 'queued') return 'badge running';
        return 'badge pending';
      }
      function loadBuild() {
        var jobId = getJobId();
        if (!jobId) {
          document.getElementById('build-loading').style.display = 'none';
          document.getElementById('build-error').style.display = 'block';
          document.getElementById('build-error').textContent = 'Missing job_id in URL.';
          return;
        }
        document.getElementById('job-id').textContent = '#' + jobId;
        Promise.all([
          api.get('/builds/jobs/' + jobId),
          api.get('/packages?limit=500').catch(function() { return { items: [] }; }),
          api.get('/releases?limit=500').catch(function() { return { items: [] }; })
        ]).then(function(results) {
          var job = results[0];
          var packages = (results[1] && results[1].items) ? results[1].items : [];
          var releases = (results[2] && results[2].items) ? results[2].items : [];
          document.getElementById('build-loading').style.display = 'none';
          document.getElementById('build-meta').style.display = 'block';
          var pkg = packages.find(function(p) { return p.id === job.package_id; });
          var rel = releases.find(function(r) { return r.id === job.release_id; });
          var pkgLabel = pkg && (pkg.name || '').trim() ? escapeHtml(pkg.name) + ' (' + job.package_id + ')' : ('#' + (job.package_id || '—'));
          var relLabel = rel && (rel.releasename || '').trim() ? escapeHtml(rel.releasename) + ' (' + job.release_id + ')' : ('#' + (job.release_id || '—'));
          var meta = document.getElementById('build-meta');
          meta.innerHTML = '<dl><dt>Package</dt><dd>' + pkgLabel + '</dd>' +
            '<dt>Release</dt><dd>' + relLabel + '</dd>' +
            '<dt>Architecture</dt><dd>' + escapeHtml(job.architecture || '—') + '</dd>' +
            '<dt>Status</dt><dd><span class="' + statusClass(job.status) + '">' + (job.status || '') + '</span></dd>' +
            '<dt>Created</dt><dd>' + (job.created_at || '').slice(0, 19) + '</dd>' +
            '<dt>Completed</dt><dd>' + (job.completed_at ? job.completed_at.slice(0, 19) : '—') + '</dd></dl>';
          return api.get('/builds/jobs/' + jobId + '/attempts');
        }).then(function(attempts) {
          var list = Array.isArray(attempts) ? attempts : [];
          var container = document.getElementById('attempts-list');
          if (!list.length) {
            container.innerHTML = '<p class="log-placeholder">No attempts yet.</p>';
            return;
          }
          container.innerHTML = list.map(function(a, idx) {
            var err = (a.error_message && a.error_message.trim()) ? '<div class="attempt-error">' + escapeHtml(a.error_message) + '</div>' : '';
            var logId = 'log-' + a.id;
            return '<div class="attempt-card" data-attempt-id="' + a.id + '">' +
              '<h4>Attempt #' + (a.attempt_number || (idx + 1)) + ' <span class="' + statusClass(a.status) + '">' + (a.status || '') + '</span></h4>' +
              '<div><small>Started: ' + (a.started_at ? a.started_at.slice(0, 19) : '—') + ' &nbsp; Finished: ' + (a.finished_at ? a.finished_at.slice(0, 19) : '—') + '</small></div>' +
              err +
              '<div class="artifacts" id="artifacts-' + a.id + '" style="margin-top:0.5rem; font-size:0.9rem; color:var(--text-muted);">Artifacts: loading…</div>' +
              '<div style="margin-top:0.5rem;"><button type="button" class="btn load-log" data-attempt-id="' + a.id + '">View log</button></div>' +
              '<pre id="' + logId + '" class="log-viewer" style="display:none; margin-top:0.5rem;"></pre>' +
              '</div>';
          }).join('');
          container.querySelectorAll('.load-log').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var attemptId = btn.dataset.attemptId;
              var pre = document.getElementById('log-' + attemptId);
              if (!pre) return;
              if (pre.dataset.loaded === '1') {
                pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
                return;
              }
              pre.style.display = 'block';
              pre.textContent = 'Loading…';
              api.get('/logs/attempts/' + attemptId + '/tail?lines=2000').then(function(r) {
                var lines = (r && r.lines) ? r.lines : [];
                pre.textContent = lines.join('\n') || '(empty log)';
                pre.dataset.loaded = '1';
              }).catch(function(e) {
                pre.textContent = 'Log not available: ' + (e.message || 'Log not yet uploaded or build did not produce a log.');
                pre.dataset.loaded = '1';
              });
            });
          });
          // Load artifacts (including signing status) for each attempt
          list.forEach(function(a) {
            var placeholder = document.getElementById('artifacts-' + a.id);
            if (!placeholder) return;
            api.get('/builds/attempts/' + a.id + '/artifacts').then(function(arts) {
              var arr = Array.isArray(arts) ? arts : [];
              if (!arr.length) {
                placeholder.textContent = 'Artifacts: none';
                return;
              }
              var rows = arr.map(function(ar) {
                var signed = ar.is_signed ? 'Yes' : 'No';
                return '<tr><td>' + escapeHtml(ar.filename || '') + '</td><td>' + signed + '</td></tr>';
              }).join('');
              placeholder.innerHTML = '<table class="table-compact"><thead><tr><th>Name</th><th>Signed</th></tr></thead><tbody>' + rows + '</tbody></table>';
              placeholder.style.color = '';
            }).catch(function() {
              placeholder.textContent = 'Artifacts: failed to load';
            });
          });
        }).catch(function(e) {
          document.getElementById('build-loading').style.display = 'none';
          document.getElementById('build-error').style.display = 'block';
          document.getElementById('build-error').textContent = 'Failed to load build: ' + (e.message || e);
        });
      }
      loadBuild();
    })();
  </script>
</body>
</html>
