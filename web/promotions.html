<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promotions - Oreon Build Service</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <style>
    .promo-testing { background: #d4edda; color: #155724; }
    .promo-stable { background: #cce5ff; color: #004085; }
    .promo-keep { background: #e2e3e5; color: #383d41; }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="header-logo-link"><img src="/static/obslogo.png" alt="Oreon Build Service" class="header-logo" /></a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/builds.html">Builds</a>
      <a href="/packages.html">Packages</a>
      <a href="/releases.html">Releases</a>
      <a href="/workers.html">Workers</a>
      <a href="/mock-environments.html">Mock Environments</a>
      <a href="/repos.html">Repositories</a>
      <a href="/promotions.html">Promotions</a>
      <form class="navbar-search" action="/search.html" method="get" style="display:inline-flex; margin-left:0.5rem;">
        <input type="search" name="q" placeholder="Search…" style="padding:0.25rem 0.5rem; width:10rem;">
        <button type="submit" class="btn" style="margin-left:0.25rem;">Go</button>
      </form>
      <span id="auth-section"><span id="user-info"></span><button id="btn-login" type="button">Login</button><button id="btn-logout" type="button" style="display:none">Logout</button></span>
    </nav>
  </header>
  <main class="main">
    <section class="card">
      <h2>Promotions</h2>
      <p id="promo-hint">Completed builds appear here as promotion candidates. Login to promote to Testing or Stable, or keep in Dev.</p>
      <div class="form-group" style="margin-bottom:1rem; display:flex; gap:1rem; flex-wrap:wrap;">
        <label style="display:flex; align-items:center;">Filter</label>
        <input type="text" id="promo-text-filter" placeholder="Filter by package, ID…" style="padding:0.4rem; width:12rem;">
        <select id="promo-status-filter">
          <option value="">All</option>
          <option value="pending" selected>Pending only</option>
          <option value="promoted_testing">Promoted to Testing</option>
          <option value="promoted_stable">Promoted to Stable</option>
          <option value="kept_dev">Kept in Dev</option>
        </select>
      </div>
      <div class="list-toolbar">
        <div class="select-all-wrap"><label for="promo-select-all">Select all</label></div>
        <div class="pagination">
          <button type="button" class="btn" id="promo-prev" disabled>Prev</button>
          <span class="page-info" id="promo-page-info">Page 1 of 1</span>
          <button type="button" class="btn" id="promo-next" disabled>Next</button>
          <select class="page-size" id="promo-page-size"><option value="25" selected>25</option><option value="50">50</option><option value="100">100</option></select>
        </div>
      </div>
      <table class="table-list">
        <thead>
          <tr><th class="col-checkbox"><input type="checkbox" id="promo-select-all" title="Select all on this page"></th><th>ID</th><th>Package</th><th>Release ID</th><th>Build Job</th><th>Status</th><th>Created</th><th>Actions</th></tr>
        </thead>
        <tbody id="promo-tbody"></tbody>
      </table>
    </section>
  </main>
  <script src="/static/app.js?v=2"></script>
  <script>
    (function() {
      const api = window.oreonApi;
      var promoPage = 0, promoPageSize = 25, promoTotal = 0;
      function load() {
        var statusFilter = document.getElementById('promo-status-filter').value;
        var path = '/promotions?limit=' + promoPageSize + '&offset=' + (promoPage * promoPageSize);
        if (statusFilter) path += '&status_filter=' + encodeURIComponent(statusFilter);
        api.get(path).then(function(data) {
          var tbody = document.getElementById('promo-tbody');
          if (!tbody) return;
          var list = (data && data.items) ? data.items : [];
          promoTotal = (data && typeof data.total === 'number') ? data.total : 0;
          var canAct = !!api.token;
          function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
          tbody.innerHTML = list.map(function(p) {
            var status = p.status || 'pending';
            var statusClass = status === 'promoted_testing' ? 'promo-testing' : status === 'promoted_stable' ? 'promo-stable' : status === 'kept_dev' ? 'promo-keep' : '';
            var actions = '';
            if (status === 'pending' && canAct) {
              actions = '<button type="button" class="btn promo-testing" data-id="' + p.id + '" data-action="to-testing">Promote to Testing</button> ' +
                '<button type="button" class="btn promo-stable" data-id="' + p.id + '" data-action="to-stable">Promote to Stable</button> ' +
                '<button type="button" class="btn promo-keep" data-id="' + p.id + '" data-action="keep-dev">Keep in Dev</button>';
            } else {
              actions = p.to_channel ? (p.from_channel + ' → ' + p.to_channel) : '-';
            }
            var filterStr = (p.id + ' ' + (p.package_name || '') + ' ' + (p.package_id || '') + ' ' + (p.release_id || '') + ' ' + (p.build_job_id || '') + ' ' + status).toLowerCase();
            return '<tr data-filter="' + filterStr.replace(/"/g, '&quot;') + '"><td class="col-checkbox"><input type="checkbox" class="promo-row-cb" data-id="' + p.id + '"></td><td>' + p.id + '</td><td>' + esc(p.package_name || '') + ' <span style="color:var(--text-muted)">(' + (p.package_id || '') + ')</span></td><td>' + p.release_id + '</td><td>' +
              (p.build_job_id ? '<a href="/build.html?job_id=' + p.build_job_id + '">' + p.build_job_id + '</a>' : '-') + '</td><td><span class="' + statusClass + '">' + esc(status) + '</span></td><td>' + (p.created_at ? new Date(p.created_at).toLocaleString() : '') + '</td><td>' + actions + '</td></tr>';
          }).join('') || '<tr><td colspan="8">No promotions</td></tr>';
          var selectAllEl = document.getElementById('promo-select-all');
          if (selectAllEl) { selectAllEl.checked = false; selectAllEl.onclick = function() { tbody.querySelectorAll('.promo-row-cb').forEach(function(cb) { cb.checked = selectAllEl.checked; }); }; }
          tbody.querySelectorAll('.promo-row-cb').forEach(function(cb) {
            cb.addEventListener('change', function() {
              var rowCbs = tbody.querySelectorAll('.promo-row-cb');
              var checked = tbody.querySelectorAll('.promo-row-cb:checked').length;
              if (selectAllEl) selectAllEl.checked = checked === rowCbs.length && rowCbs.length > 0;
            });
          });
          var textFilter = document.getElementById('promo-text-filter');
          if (textFilter) {
            textFilter.oninput = function() {
              var v = (textFilter.value || '').toLowerCase();
              tbody.querySelectorAll('tr[data-filter]').forEach(function(tr) {
                tr.style.display = (!v || (tr.getAttribute('data-filter') || '').indexOf(v) !== -1) ? '' : 'none';
              });
            };
          }
          tbody.querySelectorAll('[data-action]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var id = btn.dataset.id;
              var action = btn.dataset.action;
              var path = '/promotions/' + id + '/' + (action === 'to-testing' ? 'to-testing' : action === 'to-stable' ? 'to-stable' : 'keep-dev');
              api.post(path).then(function() { load(); }).catch(function(e) { alert('Failed: ' + e.message); });
            });
          });
          var numPages = promoTotal ? Math.ceil(promoTotal / promoPageSize) : 1;
          document.getElementById('promo-page-info').textContent = 'Page ' + (promoPage + 1) + ' of ' + numPages;
          document.getElementById('promo-prev').disabled = promoPage <= 0;
          document.getElementById('promo-next').disabled = promoPage >= numPages - 1;
        }).catch(function() {
          var tbody = document.getElementById('promo-tbody');
          if (tbody) tbody.innerHTML = '<tr><td colspan="8">Failed to load</td></tr>';
        });
      }
      (function initPromoPagination() {
        document.getElementById('promo-prev').addEventListener('click', function() { if (promoPage > 0) { promoPage--; load(); } });
        document.getElementById('promo-next').addEventListener('click', function() { var n = promoTotal ? Math.ceil(promoTotal / promoPageSize) : 1; if (promoPage < n - 1) { promoPage++; load(); } });
        document.getElementById('promo-page-size').addEventListener('change', function() { promoPageSize = parseInt(this.value, 10) || 25; promoPage = 0; load(); });
      })();
      document.getElementById('promo-status-filter').addEventListener('change', load);
      load();
    })();
  </script>
</body>
</html>
